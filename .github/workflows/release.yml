name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Verify & Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Set Maven version from tag
        run: mvn versions:set -DnewVersion=${{ steps.version.outputs.VERSION }} --batch-mode

      # Step 1 — Code formatting
      - name: "Step 1: Spotless (code formatting)"
        run: mvn spotless:check --batch-mode --no-transfer-progress

      # Step 2 — Compile
      - name: "Step 2: Compile"
        run: mvn clean compile --batch-mode --no-transfer-progress

      # Step 3 — Unit tests
      - name: "Step 3: Unit Tests"
        run: mvn test --batch-mode --no-transfer-progress

      # Step 4 — Static analysis
      - name: "Step 4: SpotBugs (static analysis)"
        run: mvn spotbugs:check --batch-mode --no-transfer-progress

      # Step 5 — Package JAR
      - name: "Step 5: Package"
        run: mvn package -DskipTests --batch-mode --no-transfer-progress

      # Step 6 — Create release with JAR attached
      - name: "Step 6: Create GitHub Release"
        uses: softprops/action-gh-release@v2
        with:
          files: target/Puk3pFlyFix-*.jar
          generate_release_notes: true
          draft: false
          prerelease: false
